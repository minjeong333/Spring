<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>오늘의 요리사</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #fff8e1, #ffe0b2);
        }

        .container {
            width: 360px;
            margin: 60px auto;
            padding: 35px 25px;
            background-color: white;
            border-radius: 30px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        h1 {
            margin-top: 0;
            font-size: 32px;
            color: #ff7043;
        }

        .badge {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 18px;
            border-radius: 20px;
            background-color: #ffcc80;
            color: #5d4037;
            font-weight: bold;
        }

        .cook-image {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ff9800;
            background-color: #fff3e0;
        }

        .cook-name {
            font-size: 34px;
            font-weight: bold;
            margin-top: 25px;
            color: #ff5722;
        }

        .message-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 18px;
            background-color: #fff3e0;
            color: #6d4c41;
            font-size: 18px;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            border-radius: 25px;
            background-color: #ff9800;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #f57c00;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>오늘의 요리사</h1>

    <div class="badge">🏆 TODAY CHEF 🏆</div>

    <br>

    <img th:src="@{/images/cook.png}" alt="귀여운 요리사" class="cook-image">

    <div class="cook-name" th:text="${cook.name}"></div>

    <div class="message-box">
        🍳 오늘의 주방을 부탁해요!
    </div>

    <a href="/today-cook" class="btn">다시 뽑기 🎲</a>
</div>

</body>
</html>
